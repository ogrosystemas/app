name: Build e publicar Mutantes MC em /mensalidades

# Dispara só quando algo dentro da pasta do código-fonte deste app muda.
# Isso evita rodar este workflow por causa de mudanças nos outros PWAs do repositório.
#
# O commit automático feito no final deste workflow inclui "[skip ci]" na mensagem,
# o que faz o GitHub nativamente NÃO disparar este workflow de novo por causa dele
# (comportamento built-in do GitHub Actions, sem necessidade de configuração extra) —
# isso evita o loop infinito de push -> build -> commit -> push -> build -> ...
on:
  push:
    branches: [main]
    paths:
      - "mensalidades-src/**"
      - ".github/workflows/deploy-mensalidades.yml"
  workflow_dispatch: {} # permite disparar manualmente pela aba Actions, se precisar

# Evita execuções simultâneas conflitantes (ex: dois pushes rápidos seguidos).
concurrency:
  group: deploy-mensalidades
  cancel-in-progress: true

jobs:
  build-e-publicar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mensalidades-src/package-lock.json

      - name: Instalar dependências
        working-directory: mensalidades-src
        run: npm ci

      - name: Build de produção (Vite)
        working-directory: mensalidades-src
        run: npm run build

      - name: Sincronizar build para a pasta servida pelo Pages
        run: |
          # Apaga o conteúdo antigo de mensalidades/ (exceto a própria pasta) e
          # substitui pelo build novo, mantendo a estrutura que o Pages já espera.
          rm -rf mensalidades
          mkdir -p mensalidades
          cp -r mensalidades-src/dist/. mensalidades/

      - name: Commit e push do build atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mensalidades
          if git diff --staged --quiet; then
            echo "Nada para publicar — build idêntico ao já publicado."
          else
            git commit -m "chore: atualiza build de mensalidades [skip ci]"
            git push
          fi
