<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cutelaria Custo - Calculadora de Custos</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">

    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/animations.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-content">
            <div class="splash-icon">🔪</div>
            <h1>Cutelaria Custo</h1>
            <p>Calculadora de Custos</p>
            <div class="splash-loader"></div>
        </div>
    </div>

    <!-- App Container -->
    <div id="app" style="display:none;">
        <!-- Header -->
        <header id="main-header">
            <div class="header-content">
                <button id="menu-btn" class="icon-btn" aria-label="Menu">☰</button>
                <h1 id="page-title">Dashboard</h1>
                <button id="backup-btn" class="icon-btn" aria-label="Backup">💾</button>
            </div>
        </header>

        <!-- Side Menu -->
        <nav id="side-menu">
            <div class="menu-header">
                <div class="menu-icon">🔪</div>
                <h2>Cutelaria Custo</h2>
            </div>
            <ul class="menu-list">
                <li><a href="#dashboard" data-page="dashboard" class="active">📊 Dashboard</a></li>
                <li><a href="#materiais" data-page="materiais">📦 Materiais</a></li>
                <li><a href="#insumos" data-page="insumos">🧪 Insumos</a></li>
                <li><a href="#equipamentos" data-page="equipamentos">🔧 Equipamentos</a></li>
                <li><a href="#faca" data-page="faca">➕ Nova Faca</a></li>
                <li><a href="#historico" data-page="historico">📜 Histórico</a></li>
                <li><a href="#configuracoes" data-page="configuracoes">⚙️ Configurações</a></li>
            </ul>
            <div class="menu-footer">
                <button id="export-json" class="btn-secondary">📤 Exportar</button>
                <button id="import-json" class="btn-secondary">📥 Importar</button>
                <input type="file" id="import-file" accept=".json" hidden>
            </div>
        </nav>
        <div id="menu-overlay"></div>

        <!-- Main Content -->
        <main id="main-content"></main>

        <!-- Bottom Navbar (mobile) -->
        <nav id="bottom-nav">
            <a href="#dashboard" data-page="dashboard" class="nav-item active">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Início</span>
            </a>
            <a href="#materiais" data-page="materiais" class="nav-item">
                <span class="nav-icon">📦</span>
                <span class="nav-label">Materiais</span>
            </a>
            <a href="#faca" data-page="faca" class="nav-item nav-main">
                <span class="nav-icon">➕</span>
            </a>
            <a href="#historico" data-page="historico" class="nav-item">
                <span class="nav-icon">📜</span>
                <span class="nav-label">Histórico</span>
            </a>
            <a href="#configuracoes" data-page="configuracoes" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Ajustes</span>
            </a>
        </nav>

        <!-- Modal Overlay -->
        <div id="modal-overlay" class="modal-overlay"></div>
        <div id="modal-container"></div>

        <!-- Toast -->
        <div id="toast" class="toast"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Utils -->
    <script src="js/utils/constants.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/formatters.js"></script>
    <script src="js/utils/validators.js"></script>
    <script src="js/utils/calculations.js"></script>

    <!-- Services -->
    <script src="js/services/db.js"></script>
    <script src="js/services/storage.js"></script>
    <script src="js/services/export-import.js"></script>
    <script src="js/services/cache.js"></script>

    <!-- Modules -->
    <script src="js/modules/toast.js"></script>
    <script src="js/modules/modal.js"></script>
    <script src="js/modules/navbar.js"></script>
    <script src="js/modules/ui.js"></script>
    <script src="js/modules/router.js"></script>

    <!-- Pages -->
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/materiais.js"></script>
    <script src="js/pages/insumos.js"></script>
    <script src="js/pages/equipamentos.js"></script>
    <script src="js/pages/faca.js"></script>
    <script src="js/pages/historico.js"></script>
    <script src="js/pages/configuracoes.js"></script>

    <!-- App -->
    <script src="js/modules/app.js"></script>
</body>
</html>
