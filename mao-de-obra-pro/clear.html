<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limpando cache...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; background: #f1f5f9; }
    .box { background: #fff; border-radius: 16px; padding: 2rem; text-align: center;
           box-shadow: 0 4px 24px rgba(0,0,0,.1); max-width: 320px; width: 90%; }
    h2 { color: #2563eb; margin-top: 0; }
    p  { color: #64748b; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0;
               border-top-color: #2563eb; border-radius: 50%;
               animation: spin .8s linear infinite; margin: 1rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { display: inline-block; margin-top: 1rem; padding: .75rem 1.5rem;
        background: #2563eb; color: #fff; border-radius: 8px;
        text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Mão de Obra PRO</h2>
    <div class="spinner" id="spinner"></div>
    <p id="msg">Removendo cache e Service Workers...</p>
    <a href="." id="btn-voltar" style="display:none">Abrir o app</a>
  </div>

  <script>
    async function limparTudo() {
      try {
        // Remove todos os Service Workers
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }

        // Limpa todos os caches
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }

        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').textContent = 'Pronto! Cache e SW removidos.';
        document.getElementById('btn-voltar').style.display = 'inline-block';
      } catch (err) {
        document.getElementById('msg').textContent = 'Erro: ' + err.message;
      }
    }

    limparTudo();
  </script>
</body>
</html>
