<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="description" content="Sistema de orçamentos para profissionais autônomos">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MDO Pro">

  <title>Mão de Obra PRO</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="has-nav">

  <div id="app-shell">
    <div id="app-loader">
      <div class="spinner-border" role="status"></div>
      <div id="app-loader-msg">Iniciando...</div>
    </div>
    <div id="page-content"></div>

    <nav id="main-nav" class="d-none">
      <button class="nav-link" data-route="/" onclick="navigate('/')">
        <i class="bi bi-house-fill"></i><span>Início</span>
      </button>
      <button class="nav-link" data-route="/clientes" onclick="navigate('/clientes')">
        <i class="bi bi-people-fill"></i><span>Clientes</span>
      </button>
      <button class="nav-link" data-route="/catalogo" onclick="navigate('/catalogo')">
        <i class="bi bi-tools"></i><span>Catálogo</span>
      </button>
      <button class="nav-link" data-route="/configuracoes" onclick="navigate('/configuracoes')">
        <i class="bi bi-gear-fill"></i><span>Config</span>
      </button>
      <button class="nav-link d-none" id="btn-instalar" onclick="instalarApp()">
        <i class="bi bi-download"></i><span>Instalar</span>
      </button>
    </nav>

    <button id="fab-novo" class="d-none" onclick="navigate('/orcamento')" title="Novo Orçamento">
      <i class="bi bi-plus-lg"></i>
    </button>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <!-- Banner de atualização disponível -->
  <div id="update-banner" class="d-none position-fixed bottom-0 start-0 end-0 p-3" style="z-index:3000;bottom:72px!important">
    <div class="alert alert-primary d-flex align-items-center justify-content-between mb-0 shadow-lg rounded-3 py-2 px-3">
      <div class="small fw-semibold"><i class="bi bi-arrow-repeat me-2"></i>Nova versão disponível!</div>
      <button class="btn btn-primary btn-sm" onclick="aplicarAtualizacao()">Atualizar</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Fallback simples — será sobrescrito pelo router.js após carregamento do módulo
    function navigate(path, params) {
      var q = (params && Object.keys(params).length)
        ? '?' + new URLSearchParams(params).toString() : '';
      window.location.hash = path + q;
    }

    // Remove SWs antigos e registra o novo
    var _swRegistration = null;

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').then(function(reg) {
          _swRegistration = reg;

          // SW já está esperando (ex: página reaberta com update pendente)
          if (reg.waiting) {
            mostrarBannerAtualizacao(reg.waiting);
          }

          // SW novo foi instalado e está esperando ativação
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                mostrarBannerAtualizacao(newWorker);
              }
            });
          });

        }).catch(function(e) {
          console.error('SW erro:', e);
        });

        // Quando o SW tomar controle, recarrega a página para aplicar
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          window.location.reload();
        });
      });
    }

    function mostrarBannerAtualizacao(worker) {
      window._pendingWorker = worker;
      var banner = document.getElementById('update-banner');
      if (banner) banner.classList.remove('d-none');
    }

    window.aplicarAtualizacao = function() {
      if (window._pendingWorker) {
        window._pendingWorker.postMessage({ type: 'SKIP_WAITING' });
      }
    };
  </script>

  <script type="module" src="js/app.js"></script>

  <script>
    var _installPrompt = null;

    // Captura o prompt nativo (Android/Chrome/Edge)
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      _installPrompt = e;
    });

    // Esconde o botão se já instalou
    window.addEventListener('appinstalled', function() {
      _installPrompt = null;
      var btn = document.getElementById('btn-instalar');
      if (btn) btn.classList.add('d-none');
    });

    window.instalarApp = async function() {
      // Já está rodando como app instalado?
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;

      if (isStandalone) {
        alert('O app já está instalado!');
        return;
      }

      // Android/Chrome — prompt nativo disponível
      if (_installPrompt) {
        _installPrompt.prompt();
        var result = await _installPrompt.userChoice;
        if (result.outcome === 'accepted') {
          _installPrompt = null;
          var btn = document.getElementById('btn-instalar');
          if (btn) btn.classList.add('d-none');
        }
        return;
      }

      // iOS Safari — instrução manual
      var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      if (isIOS) {
        alert('Para instalar no iPhone/iPad:\n\n1. Toque no botão compartilhar (□↑) na barra do Safari\n2. Role até \"Adicionar à Tela de Início\"\n3. Toque em \"Adicionar\"');
        return;
      }

      // Chrome desktop ou outros — instrução manual
      alert('Para instalar:\n\nNo Chrome: clique no ícone ⊕ na barra de endereço\nOu: menu (⋮) → \"Instalar app\"');
    };

    // Mostra o botão quando o prompt nativo estiver disponível
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      _installPrompt = e;
      var btn = document.getElementById('btn-instalar');
      if (btn) btn.classList.remove('d-none');
    });
  </script>
</body>
</html>
