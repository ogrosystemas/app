<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mão de Obra Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #facc15; font-weight: bold; color: #1e293b; }
        @media print {
            nav, header, button, .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; }
            .main-card { border: none !important; box-shadow: none !important; padding: 0 !important; }
        }
        .print-only { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .check-vermelho { color: #dc2626 !important; font-family: sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans pb-10">

    <header class="bg-slate-900 text-white p-6 shadow-lg sticky top-0 z-10 no-print text-center">
        <div class="flex justify-center items-center gap-4 mb-1">
            <h1 class="text-2xl font-black text-yellow-400 tracking-tighter">MÃO DE OBRA PRO</h1>
            <div class="w-8 h-8 rounded-full bg-gray-400 border-2 border-yellow-400 overflow-hidden">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar">
            </div>
        </div>
        <p class="text-[10px] opacity-75 uppercase tracking-[0.3em]">Gestão de Valor e Tempo</p>
    </header>

    <nav class="flex bg-white shadow-md mb-6 justify-around text-[10px] font-black no-print uppercase">
        <button onclick="showTab('config')" id="tab-config" class="p-4 w-full active-tab">Config</button>
        <button onclick="showTab('obra')" id="tab-obra" class="p-4 w-full text-slate-400">Nova Obra</button>
        <button onclick="showTab('resumo')" id="tab-resumo" class="p-4 w-full text-slate-400" disabled>Resumo</button>
        <button onclick="showTab('historico')" id="tab-historico" class="p-4 w-full text-slate-400">Histórico</button>
    </nav>

    <main class="p-4 max-w-md mx-auto">

        <section id="content-config" class="no-print space-y-6">
            <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-gray-50">
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-black uppercase text-gray-500 mb-2">Meta de Lucro Mensal (R$)</label>
                        <input type="number" id="metaLucro" value="5000" class="w-full bg-gray-50 p-4 rounded-2xl border-none outline-none font-black text-2xl focus:ring-2 ring-yellow-400">
                    </div>
                    <div>
                        <label class="block text-xs font-black uppercase text-gray-500 mb-2">Custos Fixos (R$)</label>
                        <input type="number" id="custoFixo" value="1500" class="w-full bg-gray-50 p-4 rounded-2xl border-none outline-none font-black text-2xl focus:ring-2 ring-yellow-400">
                    </div>
                    <div>
                        <label class="block text-xs font-black uppercase text-gray-500 mb-2">Dias de Trabalho / Mês</label>
                        <input type="number" id="diasTrabalho" value="22" class="w-full bg-gray-50 p-4 rounded-2xl border-none outline-none font-black text-2xl focus:ring-2 ring-yellow-400">
                    </div>

                    <button onclick="salvarConfig()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black shadow-lg active:scale-95 transition-all uppercase tracking-tight">
                        SALVAR VALOR DA HORA
                    </button>

                    <div id="valorHoraCard" class="hidden mt-4 p-5 bg-gray-200 rounded-2xl text-center border border-gray-300">
                        <p class="text-sm font-bold text-slate-700">Sua hora vale <span id="valHoraTxt" class="text-slate-900 font-black">R$ 0,00</span></p>
                        <p class="text-[10px] text-slate-500 font-bold">(Prejuízo se cobrar menos)</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="content-obra" class="hidden no-print space-y-4">
            <div class="relative">
                <select id="categoriaMestra" onchange="renderizarServicos()" class="w-full p-5 bg-white rounded-2xl font-black shadow-md border-none appearance-none outline-none text-slate-800">
                    <option value="eletricista">⚡ Eletricista</option>
                    <option value="encanador">🚰 Encanador</option>
                    <option value="arcondicionado">❄️ Ar-Condicionado</option>
                </select>
            </div>

            <div id="listaServicos" class="grid grid-cols-2 gap-3 mb-4"></div>

            <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-gray-100">
                <div id="carrinhoInterface" class="space-y-3 mb-6">
                    </div>

                <div class="flex justify-between items-center bg-gray-100 p-4 rounded-2xl mb-6">
                    <span class="text-xs font-black uppercase text-slate-500">Tempo Total:</span>
                    <span id="tempoTotalTxt" class="font-black text-lg text-slate-900">0 min</span>
                </div>

                <div class="space-y-6">
                    <div>
                        <label id="labelDif" class="block text-xs font-black uppercase text-slate-500 mb-4 text-center">Dificuldade: Padrão</label>
                        <input type="range" id="multiplicador" min="1" max="3" step="1" value="2" oninput="atualizarInterfaceObra()" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-yellow-400">
                    </div>

                    <div>
                        <label class="block text-xs font-black uppercase text-slate-500 mb-2">Custo de Saída (R$):</label>
                        <input type="number" id="custoSaida" value="50" class="w-full bg-gray-50 p-4 rounded-2xl border-none font-black text-xl outline-none">
                    </div>

                    <button onclick="calcularObra()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black shadow-xl uppercase tracking-tighter italic">
                        CALCULAR PREÇO FINAL
                    </button>
                </div>
            </div>
        </section>

        <section id="content-resumo" class="hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl border border-gray-100 text-center main-card">
                <h3 class="text-gray-400 uppercase tracking-[0.3em] text-[10px] mb-4 font-black no-print">Preço Sugerido ao Cliente</h3>
                <div id="precoSugerido" class="text-5xl font-black text-slate-900 mb-10 font-mono tracking-tighter">R$ 0,00</div>

                <div class="text-left mb-8">
                    <h4 class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-4">Detalhamento dos Itens</h4>
                    <div id="listaItensResumo" class="space-y-4"></div>
                </div>

                <div class="bg-green-50 p-6 rounded-[2rem] border border-green-100 mb-8 no-print">
                    <div class="flex justify-between items-center">
                        <div class="text-left">
                            <span class="text-green-800 font-black uppercase text-[10px] block">Seu Lucro Real</span>
                            <span class="text-[10px] text-green-600 font-bold italic">Livre de despesas</span>
                        </div>
                        <span id="lucroRealTxt" class="font-black text-green-700 text-3xl font-mono">R$ 0,00</span>
                    </div>
                </div>

                <button onclick="salvarNoHistorico()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black flex items-center justify-center gap-3 shadow-xl mb-4 no-print">
                    <span>📄</span> GERAR PDF / WHATSAPP
                </button>
                <button onclick="showTab('obra')" class="text-gray-400 text-[10px] font-black uppercase no-print">← Voltar e Ajustar</button>
            </div>
        </section>

        <section id="content-historico" class="hidden no-print space-y-4">
            <div id="containerHistorico" class="space-y-4"></div>
        </section>

    </main>

    <script>
        const servicosBase = {
            eletricista: [
                { id: 1, nome: "Troca Tomada/Inter.", tempo: 15 },
                { id: 2, nome: "Instalar Chuveiro", tempo: 40 },
                { id: 3, nome: "Luminária/Plafon", tempo: 30 },
                { id: 4, nome: "Troca Disjuntor", tempo: 25 }
            ],
            encanador: [
                { id: 5, nome: "Reparo Registro", tempo: 45 },
                { id: 6, nome: "Vaso Sanitário", tempo: 90 },
                { id: 7, nome: "Troca de Torneira", tempo: 20 }
            ],
            arcondicionado: [
                { id: 8, nome: "Limpeza Completa", tempo: 120 },
                { id: 9, nome: "Instalação Split", tempo: 240 }
            ]
        };

        let valorHora = 0;
        let carrinho = {};

        // INICIALIZAÇÃO
        window.onload = () => {
            const configSalva = JSON.parse(localStorage.getItem('mopro_config'));
            if(configSalva) {
                document.getElementById('metaLucro').value = configSalva.meta;
                document.getElementById('custoFixo').value = configSalva.custo;
                document.getElementById('diasTrabalho').value = configSalva.dias;
                calcularValorHoraLocal();
            }
            renderizarServicos();
        };

        function showTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab', 'text-slate-900'));
            document.getElementById('content-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active-tab');
            if(tab === 'historico') renderizarHistorico();
        }

        // CONFIGURAÇÃO
        function salvarConfig() {
            const meta = parseFloat(document.getElementById('metaLucro').value);
            const custo = parseFloat(document.getElementById('custoFixo').value);
            const dias = parseInt(document.getElementById('diasTrabalho').value);

            localStorage.setItem('mopro_config', JSON.stringify({meta, custo, dias}));
            calcularValorHoraLocal();
            alert("Configurações salvas com sucesso!");
        }

        function calcularValorHoraLocal() {
            const meta = parseFloat(document.getElementById('metaLucro').value) || 0;
            const custo = parseFloat(document.getElementById('custoFixo').value) || 0;
            const dias = parseInt(document.getElementById('diasTrabalho').value) || 22;

            valorHora = (meta + custo) / (dias * 8); // Base 8h/dia

            const card = document.getElementById('valorHoraCard');
            document.getElementById('valHoraTxt').innerText = `R$ ${valorHora.toFixed(2)}`;
            card.classList.remove('hidden');
        }

        // NOVA OBRA
        function renderizarServicos() {
            const cat = document.getElementById('categoriaMestra').value;
            const container = document.getElementById('listaServicos');
            container.innerHTML = "";

            servicosBase[cat].forEach(s => {
                const btn = document.createElement('button');
                btn.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-[10px] font-black uppercase text-slate-700 h-20 text-center flex items-center justify-center";
                btn.innerText = s.nome;
                btn.onclick = () => adicionarAoCarrinho(s);
                container.appendChild(btn);
            });
        }

        function adicionarAoCarrinho(servico) {
            if(!carrinho[servico.id]) {
                carrinho[servico.id] = { ...servico, qtd: 1 };
            } else {
                carrinho[servico.id].qtd++;
            }
            atualizarInterfaceObra();
        }

        function mudarQtd(id, delta) {
            carrinho[id].qtd += delta;
            if(carrinho[id].qtd <= 0) delete carrinho[id];
            atualizarInterfaceObra();
        }

        function atualizarInterfaceObra() {
            const container = document.getElementById('carrinhoInterface');
            const chaves = Object.keys(carrinho);

            // Texto da dificuldade
            const dif = document.getElementById('multiplicador').value;
            const labels = ["", "Fácil", "Padrão", "Difícil"];
            document.getElementById('labelDif').innerText = `Dificuldade: ${labels[dif]}`;

            if(chaves.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-300 italic text-center py-2">Clique nos serviços acima...</p>`;
                document.getElementById('tempoTotalTxt').innerText = "0 min";
                return;
            }

            container.innerHTML = "";
            let tempoTotal = 0;

            chaves.forEach(id => {
                const s = carrinho[id];
                tempoTotal += (s.tempo * s.qtd);
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl">
                        <div class="flex items-center gap-2">
                            <span class="text-red-600 font-bold">&#x2714;&#xFE0E;</span>
                            <span class="text-[11px] font-black uppercase text-slate-700">${s.nome}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="mudarQtd(${id}, -1)" class="w-8 h-8 bg-white rounded-xl shadow-sm font-black text-slate-400">-</button>
                            <span class="text-sm font-black text-slate-800">${s.qtd}</span>
                            <button onclick="mudarQtd(${id}, 1)" class="w-8 h-8 bg-yellow-400 rounded-xl shadow-sm font-black text-slate-900">+</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('tempoTotalTxt').innerText = `${tempoTotal} min`;
        }

        // CÁLCULO E RESUMO
        function calcularObra() {
            const chaves = Object.keys(carrinho);
            if(chaves.length === 0 || valorHora === 0) {
                alert("Configure seu valor hora e selecione serviços!");
                return;
            }

            let tempoBase = 0;
            chaves.forEach(id => tempoBase += (carrinho[id].tempo * carrinho[id].qtd));

            const dif = document.getElementById('multiplicador').value;
            const fator = dif == 1 ? 0.7 : dif == 3 ? 1.5 : 1.0;
            const custoSaida = parseFloat(document.getElementById('custoSaida').value) || 0;

            const horasEfetivas = (tempoBase / 60) * fator;
            const precoFinal = (horasEfetivas * valorHora) + custoSaida;

            // Lucro Real (Preço Final - Custo Saída - Custo Fixo Proporcional)
            const config = JSON.parse(localStorage.getItem('mopro_config'));
            const custoFixoHora = config.custo / (config.dias * 8);
            const lucroReal = precoFinal - custoSaida - (custoFixoHora * horasEfetivas);

            // Renderiza Resumo
            document.getElementById('precoSugerido').innerText = `R$ ${precoFinal.toFixed(2)}`;
            document.getElementById('lucroRealTxt').innerText = `R$ ${lucroReal.toFixed(2)}`;

            const listaResumo = document.getElementById('listaItensResumo');
            listaResumo.innerHTML = "";
            chaves.forEach(id => {
                const s = carrinho[id];
                listaResumo.innerHTML += `
                    <div class="flex justify-between items-center border-b border-gray-100 pb-3">
                        <span class="text-sm font-bold text-slate-700">${s.qtd}x ${s.nome}</span>
                        <span class="text-red-600 font-bold text-lg">&#x2714;&#xFE0E;</span>
                    </div>
                `;
            });

            // Guardar objeto da obra para o histórico
            window.obraAtual = {
                id: Date.now(),
                data: new Date().toLocaleDateString('pt-BR'),
                valor: precoFinal,
                lucro: lucroReal,
                itens: chaves.length
            };

            showTab('resumo');
            document.getElementById('tab-resumo').disabled = false;
        }

        function salvarNoHistorico() {
            let hist = JSON.parse(localStorage.getItem('mopro_hist')) || [];
            hist.unshift(window.obraAtual);
            localStorage.setItem('mopro_hist', JSON.stringify(hist));
            alert("Orçamento salvo no histórico!");
            window.print();
        }

        // HISTÓRICO
        function renderizarHistorico() {
            const container = document.getElementById('containerHistorico');
            const hist = JSON.parse(localStorage.getItem('mopro_hist')) || [];

            if(hist.length === 0) {
                container.innerHTML = "<p class='text-center text-gray-400 mt-10'>Nenhuma obra registrada.</p>";
                return;
            }

            container.innerHTML = "";
            hist.forEach(o => {
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-[2rem] shadow-md border border-gray-100 flex justify-between items-center">
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-gray-400 uppercase">Obra: Apartamento Centro</p>
                            <p class="text-[10px] font-bold text-slate-400">Data: ${o.data}</p>
                            <p class="text-sm font-black text-slate-900">Valor: R$ ${o.valor.toFixed(2)}</p>
                            <p class="text-xs font-bold text-green-600">Lucro: R$ ${o.lucro.toFixed(2)}</p>
                        </div>
                        <div class="text-right">
                             <div class="h-8 w-16 bg-green-50 rounded-lg flex items-end justify-center gap-1 p-1">
                                <div class="w-2 h-3 bg-green-200 rounded-sm"></div>
                                <div class="w-2 h-5 bg-green-300 rounded-sm"></div>
                                <div class="w-2 h-6 bg-green-500 rounded-sm"></div>
                             </div>
                             <p class="text-[8px] font-black text-gray-300 uppercase mt-2">Concluído</p>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
