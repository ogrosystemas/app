<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mão de Obra Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #facc15; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans">

    <header class="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-10">
        <h1 class="text-xl font-bold text-yellow-400">MÃO DE OBRA PRO</h1>
        <p class="text-xs opacity-75 text-white">Calculadora de Lucro Real</p>
    </header>

    <nav class="flex bg-white shadow-sm mb-4 justify-around text-sm">
        <button onclick="showTab('config')" id="tab-config" class="p-3 w-full active-tab">CONFIG</button>
        <button onclick="showTab('obra')" id="tab-obra" class="p-3 w-full">NOVA OBRA</button>
        <button onclick="showTab('resumo')" id="tab-resumo" class="p-3 w-full text-gray-400" disabled>RESUMO</button>
    </nav>

    <main class="p-4 max-w-md mx-auto">

        <section id="content-config">
            <h2 class="font-bold mb-4 border-b pb-2 italic">1. Configure seu valor</h2>
            <div class="space-y-4 bg-white p-4 rounded-xl shadow">
                <div>
                    <label class="block text-sm font-medium">Meta de Lucro Mensal (R$)</label>
                    <input type="number" id="metaLucro" value="5000" class="w-full border p-2 rounded mt-1 outline-yellow-500">
                </div>
                <div>
                    <label class="block text-sm font-medium">Custos Fixos (MEI, Carro, etc)</label>
                    <input type="number" id="custoFixo" value="1500" class="w-full border p-2 rounded mt-1 outline-yellow-500">
                </div>
                <div>
                    <label class="block text-sm font-medium">Dias de Trabalho por Mês</label>
                    <input type="number" id="diasTrabalho" value="22" class="w-full border p-2 rounded mt-1 outline-yellow-500">
                </div>
                <button onclick="salvarConfig()" class="w-full bg-slate-900 text-white p-3 rounded-lg font-bold hover:bg-slate-800 transition">
                    SALVAR VALOR DA HORA
                </button>
                <div id="valorHoraCalculado" class="mt-4 text-center p-3 bg-yellow-50 rounded border border-yellow-200 hidden text-sm italic"></div>
            </div>
        </section>

        <section id="content-obra" class="hidden">
            <h2 class="font-bold mb-2 border-b pb-2 text-slate-800 text-sm italic">2. Selecione os Serviços</h2>
            <select id="categoriaMestra" onchange="renderizarServicos()" class="w-full p-3 mb-4 bg-slate-800 text-white rounded-lg font-bold">
                <option value="eletricista">⚡ Eletricista</option>
                <option value="encanador">🚰 Encanador</option>
                <option value="arcondicionado">❄️ Ar-Condicionado</option>
                <option value="pintor">🎨 Pintor</option>
            </select>

            <div id="listaServicos" class="grid grid-cols-1 gap-2 mb-6 max-h-64 overflow-y-auto p-1"></div>

            <div class="bg-white p-4 rounded-xl shadow-inner space-y-4 border-t-4 border-yellow-400">
                <div class="flex justify-between items-center text-sm">
                    <span class="font-bold text-slate-700 font-mono">Tempo Acumulado:</span>
                    <span id="tempoTotalDisplay" class="bg-slate-100 px-3 py-1 rounded-full font-mono font-bold text-slate-900">0 min</span>
                </div>
                <div>
                    <label class="block text-[10px] uppercase font-bold text-red-600 mb-1">Complexidade do Local</label>
                    <input type="range" id="multiplicador" min="0.5" max="2" step="0.1" value="1" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-yellow-500">
                    <div class="flex justify-between text-[8px] uppercase font-bold text-gray-400 mt-1">
                        <span>Fácil</span>
                        <span>Normal</span>
                        <span>Díficil</span>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium">Custo Saída/Gasolina (R$)</label>
                    <input type="number" id="kmGasto" value="50" class="w-full border p-2 rounded mt-1 outline-yellow-500">
                </div>
                <button onclick="calcularObra()" class="w-full bg-yellow-400 text-slate-900 p-4 rounded-xl font-black shadow-lg hover:bg-yellow-500 active:scale-95 transition-all">
                    GERAR PREÇO FINAL
                </button>
            </div>
        </section>

        <section id="content-resumo" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-xl border-t-8 border-slate-900">
                <h3 class="text-center text-gray-500 uppercase tracking-widest text-[10px] mb-2 font-bold font-mono">Valor Sugerido para o Cliente</h3>
                <div id="precoSugerido" class="text-4xl font-black text-center text-slate-900 mb-6 font-mono">R$ 0,00</div>

                <div class="border-t border-dashed pt-4 space-y-3">
                    <p class="flex justify-between text-xs">
                        <span class="text-gray-500 italic font-mono uppercase">Custos da Operação:</span>
                        <span id="resumoCusto" class="font-bold text-red-500">R$ 0,00</span>
                    </p>
                    <p class="flex justify-between text-sm bg-green-50 p-2 rounded border border-green-100 font-mono">
                        <span class="text-green-700 font-bold uppercase">Seu Lucro Limpo:</span>
                        <span id="resumoLucro" class="font-black text-green-700">R$ 0,00</span>
                    </p>
                </div>

                <button onclick="window.print()" class="w-full mt-8 bg-slate-900 text-white p-3 rounded-lg font-bold flex items-center justify-center gap-2 uppercase text-xs">
                    📄 Imprimir Orçamento
                </button>
                <button onclick="showTab('obra')" class="w-full mt-2 text-slate-400 text-[10px] font-bold uppercase">
                    Refazer Cálculo
                </button>
            </div>
        </section>

    </main>

    <script>
        const tabelaMestra = {
            eletricista: [
                { nome: "Troca Tomada/Interr.", tempo: 20 },
                { nome: "Instalar Chuveiro", tempo: 60 },
                { nome: "Luminária/Plafon", tempo: 45 },
                { nome: "Troca Disjuntor", tempo: 30 },
                { nome: "Circuito (até 10m)", tempo: 90 },
                { nome: "Ventilador Teto", tempo: 120 }
            ],
            encanador: [
                { nome: "Reparo Registro", tempo: 45 },
                { nome: "Instalar Vaso Sanit.", tempo: 90 },
                { nome: "Limpeza Caixa d'Água", tempo: 120 },
                { nome: "Reparo Vazamento", tempo: 120 },
                { nome: "Troca Sifão/Torneira", tempo: 30 }
            ],
            arcondicionado: [
                { nome: "Instalação (até 12k)", tempo: 240 },
                { nome: "Limpeza/Higienização", tempo: 120 },
                { nome: "Carga de Gás", tempo: 60 },
                { nome: "Desinstalação", tempo: 60 }
            ],
            pintor: [
                { nome: "Pintura m² (2 demãos)", tempo: 20 },
                { nome: "Massa Corrida m²", tempo: 40 },
                { nome: "Lixamento m²", tempo: 15 },
                { nome: "Pintura Porta/Batente", tempo: 120 }
            ]
        };

        let valorHora = 0;
        let minutosAcumulados = 0;

        // Carregar dados ao iniciar
        window.onload = () => {
            const salvo = localStorage.getItem('mopro_valorHora');
            if(salvo) {
                valorHora = parseFloat(salvo);
                document.getElementById('valorHoraCalculado').innerHTML = `Sua hora está configurada em <strong>R$ ${valorHora.toFixed(2)}</strong>.`;
                document.getElementById('valorHoraCalculado').classList.remove('hidden');
            }
            renderizarServicos();
        };

        function showTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('active-tab');
                b.classList.remove('text-gray-900');
            });

            document.getElementById('content-' + tab).classList.remove('hidden');
            const btn = document.getElementById('tab-' + tab);
            btn.classList.add('active-tab');
            btn.disabled = false;
            btn.classList.remove('text-gray-400');

            if(tab === 'obra') renderizarServicos();
        }

        function renderizarServicos() {
            const cat = document.getElementById('categoriaMestra').value;
            const container = document.getElementById('listaServicos');
            container.innerHTML = "";

            tabelaMestra[cat].forEach(item => {
                const btn = document.createElement('button');
                btn.className = "flex justify-between items-center bg-white p-3 rounded-lg border border-gray-200 text-sm hover:border-yellow-500 active:bg-yellow-50 shadow-sm";
                btn.innerHTML = `<span>${item.nome}</span> <span class="bg-gray-100 text-gray-500 text-[10px] px-2 py-1 rounded font-bold">${item.tempo} MIN</span>`;
                btn.onclick = () => {
                    minutosAcumulados += item.tempo;
                    document.getElementById('tempoTotalDisplay').innerText = minutosAcumulados + " min";
                };
                container.appendChild(btn);
            });
        }

        function salvarConfig() {
            const lucro = parseFloat(document.getElementById('metaLucro').value) || 0;
            const custo = parseFloat(document.getElementById('custoFixo').value) || 0;
            const dias = parseInt(document.getElementById('diasTrabalho').value) || 22;
            valorHora = (lucro + custo) / (dias * 8);
            localStorage.setItem('mopro_valorHora', valorHora);
            document.getElementById('valorHoraCalculado').innerHTML = `Sua hora vale <strong>R$ ${valorHora.toFixed(2)}</strong>.`;
            document.getElementById('valorHoraCalculado').classList.remove('hidden');
            alert("Configuração Salva com sucesso!");
        }

        function calcularObra() {
            if(valorHora <= 0) {
                alert("Configure seu valor de hora na aba CONFIG primeiro!");
                showTab('config');
                return;
            }
            if(minutosAcumulados <= 0) {
                alert("Selecione pelo menos um serviço!");
                return;
            }

            const mult = parseFloat(document.getElementById('multiplicador').value);
            const deslocamento = parseFloat(document.getElementById('kmGasto').value) || 0;

            const tempoFinalHoras = (minutosAcumulados / 60) * mult;
            const precoTrabalho = tempoFinalHoras * valorHora;
            const totalGeral = precoTrabalho + deslocamento;

            // Cálculo do lucro real (Total - Deslocamento - Proporção de Custos Fixos)
            const custoFixoMensal = parseFloat(document.getElementById('custoFixo').value) || 0;
            const custoFixoPorHora = custoFixoMensal / (parseInt(document.getElementById('diasTrabalho').value) * 8);
            const lucroLimpo = totalGeral - (deslocamento + (custoFixoPorHora * tempoFinalHoras));

            document.getElementById('precoSugerido').innerText = "R$ " + totalGeral.toFixed(2);
            document.getElementById('resumoCusto').innerText = "R$ " + (totalGeral - lucroLimpo).toFixed(2);
            document.getElementById('resumoLucro').innerText = "R$ " + lucroLimpo.toFixed(2);

            showTab('resumo');
            minutosAcumulados = 0; // Reseta para o próximo
            document.getElementById('tempoTotalDisplay').innerText = "0 min";
        }
    </script>
</body>
</html>
