<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="description" content="Sistema de orçamentos para profissionais autônomos">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MDO Pro">

  <title>Mão de Obra PRO</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- App CSS -->
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="has-nav">

  <!-- App Shell -->
  <div id="app-shell">

    <!-- Loader inicial -->
    <div id="app-loader">
      <div class="spinner-border" role="status"></div>
      <div id="app-loader-msg">Iniciando...</div>
    </div>

    <!-- Conteúdo das páginas -->
    <div id="page-content"></div>

    <!-- Bottom Navigation -->
    <nav id="main-nav" class="d-none">
      <button class="nav-link" data-route="/" onclick="navigate('/')">
        <i class="bi bi-house-fill"></i>
        <span>Início</span>
      </button>
      <button class="nav-link" data-route="/clientes" onclick="navigate('/clientes')">
        <i class="bi bi-people-fill"></i>
        <span>Clientes</span>
      </button>
      <button class="nav-link" data-route="/catalogo" onclick="navigate('/catalogo')">
        <i class="bi bi-tools"></i>
        <span>Catálogo</span>
      </button>
      <button class="nav-link" data-route="/configuracoes" onclick="navigate('/configuracoes')">
        <i class="bi bi-gear-fill"></i>
        <span>Config</span>
      </button>
    </nav>

    <!-- FAB — Novo Orçamento -->
    <button id="fab-novo" class="d-none" onclick="navigate('/orcamento')" title="Novo Orçamento">
      <i class="bi bi-plus-lg"></i>
    </button>

  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Expõe navigate globalmente antes do app.js carregar -->
  <script>
    function navigate(path, params) {
      const q = params && Object.keys(params).length
        ? '?' + new URLSearchParams(params).toString() : '';
      window.location.hash = path + q;
    }
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/mao-de-obra-pro/sw.js').catch(console.error);
      });
    }
  </script>

  <!-- App principal (ES modules) -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
