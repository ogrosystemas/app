<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="description" content="Sistema de orçamentos para profissionais autônomos">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MDO Pro">

  <title>Mão de Obra PRO</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="has-nav">

  <div id="app-shell">
    <div id="app-loader">
      <div class="spinner-border" role="status"></div>
      <div id="app-loader-msg">Iniciando...</div>
    </div>
    <div id="page-content"></div>

    <nav id="main-nav" class="d-none">
      <button class="nav-link" data-route="/" onclick="navigate('/')">
        <i class="bi bi-house-fill"></i><span>Início</span>
      </button>
      <button class="nav-link" data-route="/clientes" onclick="navigate('/clientes')">
        <i class="bi bi-people-fill"></i><span>Clientes</span>
      </button>
      <button class="nav-link" data-route="/catalogo" onclick="navigate('/catalogo')">
        <i class="bi bi-tools"></i><span>Catálogo</span>
      </button>
      <button class="nav-link" data-route="/configuracoes" onclick="navigate('/configuracoes')">
        <i class="bi bi-gear-fill"></i><span>Config</span>
      </button>
    </nav>

    <button id="fab-novo" class="d-none" onclick="navigate('/orcamento')" title="Novo Orçamento">
      <i class="bi bi-plus-lg"></i>
    </button>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function navigate(path, params) {
      var q = (params && Object.keys(params).length)
        ? '?' + new URLSearchParams(params).toString() : '';
      window.location.hash = path + q;
    }

    // Remove SWs antigos e registra o novo
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        // Limpa todos os SWs registrados antes de registrar o novo
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          var unregistrations = registrations.map(function(r) {
            return r.unregister();
          });
          return Promise.all(unregistrations);
        }).then(function() {
          // Limpa todos os caches antigos
          return caches.keys().then(function(keys) {
            return Promise.all(keys.map(function(k) { return caches.delete(k); }));
          });
        }).then(function() {
          // Registra o SW novo com path relativo
          return navigator.serviceWorker.register('sw.js');
        }).catch(function(e) {
          console.error('SW erro:', e);
        });
      });
    }
  </script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
