<!DOCTYPE html>

<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0,
      viewport-fit=cover
    "
  />

  <title>Cutelaria OS</title>

  <meta
    name="theme-color"
    content="#020617"
  />

  <link
    rel="manifest"
    href="./manifest.json"
  />

  <link
    rel="icon"
    href="./assets/icons/icon-192.png"
  />

  <!-- GOOGLE FONTS -->

<style>
@import url('https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Dela+Gothic+One&family=Exo+2:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sedgwick+Ave&family=Sedgwick+Ave+Display&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Viga&family=Zen+Dots&display=swap');
</style>
  <style>

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;

    }

    body {

      font-family: 'Inter', sans-serif;

      background:
        radial-gradient(
          circle at top,
          rgba(30,41,59,.55),
          transparent 40%
        ),
        #020617;

      color: #f8fafc;

      min-height: 100vh;

      overflow-x: hidden;

    }

    #app {

      width: 100%;

      max-width: 760px;

      margin: auto;

      padding:
        24px
        18px
        140px;

    }

    /* CARDS */

    .card {

      background:
        rgba(15,23,42,.72);

      border:
        1px solid
        rgba(51,65,85,.45);

      backdrop-filter: blur(14px);

      border-radius: 28px;

      padding: 22px;

      box-shadow:
        0 10px 40px rgba(0,0,0,.22);

    }

    /* BOTÕES */

    .primary-button {

      width: 100%;

      border: none;

      cursor: pointer;

      border-radius: 18px;

      padding:
        14px
        18px;

      background:
        linear-gradient(
          135deg,
          #f97316,
          #ea580c
        );

      color: white;

      font-weight: 700;

      transition: .25s;

      box-shadow:
        0 10px 30px rgba(249,115,22,.18);

    }

    .primary-button:hover {

      transform:
        translateY(-2px);

    }

    /* INPUTS */

    input,
    textarea,
    select {

      width: 100%;

      border-radius: 18px;

      border:
        1px solid
        rgba(51,65,85,.6);

      background:
        rgba(15,23,42,.92);

      color: #f8fafc;

      padding:
        14px
        16px;

      margin-bottom: 14px;

      outline: none;

      transition: .2s;

      font-size: 15px;

    }

    input:focus,
    textarea:focus,
    select:focus {

      border-color:
        rgba(249,115,22,.7);

      box-shadow:
        0 0 0 4px rgba(249,115,22,.12);

    }

    select option {

      background: #0f172a;
      color: #f8fafc;

    }

    ::placeholder {

      color: #94a3b8;

    }

    /* NAVBAR */

    #bottomNav {

      position: fixed;

      left: 50%;

      bottom: 18px;

      transform: translateX(-50%);

      width: calc(100% - 24px);

      max-width: 760px;

      display: grid;

      grid-template-columns:
        repeat(6,1fr);

      gap: 8px;

      background:
        rgba(15,23,42,.88);

      backdrop-filter: blur(18px);

      border:
        1px solid rgba(51,65,85,.5);

      border-radius: 28px;

      padding: 12px;

      z-index: 9999;

      box-shadow:
        0 10px 40px rgba(0,0,0,.3);

    }

    #bottomNav a {

      text-decoration: none;

      color: #94a3b8;

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: center;

      gap: 6px;

      font-size: 11px;

      font-weight: 600;

      padding:
        12px
        6px;

      border-radius: 18px;

      transition: .2s;

    }

    #bottomNav a.active {

      background:
        linear-gradient(
          135deg,
          #f97316,
          #ea580c
        );

      color: white;

      box-shadow:
        0 10px 30px rgba(249,115,22,.22);

    }

    /* ICONES */

    #bottomNav svg {

      width: 20px;
      height: 20px;

      stroke-width: 2.2;

    }

    /* MOBILE */

    @media (max-width: 640px) {

      #bottomNav {

        grid-template-columns:
          repeat(3,1fr);

      }

    }

  </style>

</head>

<body>

  <div id="app"></div>


  <!-- TAILWIND -->

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CHART -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PDF -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- LUCIDE -->

  <script src="https://unpkg.com/lucide@latest"></script>

  <script
    type="module"
    src="./js/app.js"
  ></script>

</body>

</html>
